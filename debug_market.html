<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>Market Data Debug</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: #f0f4f8;
        }

        .log-item {
            background: white;
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 4px;
            border-left: 5px solid #1a56e8;
        }

        .error {
            border-left-color: #ef4444;
            color: #ef4444;
        }

        .success {
            border-left-color: #10b981;
        }
    </style>
</head>

<body>
    <h1>Market Data Debugging Tool</h1>
    <div id="logs">
        <p>Fetching market data directly via proxy...</p>
    </div>

    <script>
        const logs = document.getElementById('logs');
        function log(msg, type = '') {
            const div = document.createElement('div');
            div.className = 'log-item ' + type;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logs.appendChild(div);
            console.log(msg);
        }

        async function testFetch() {
            const symbols = ['^KS11', 'KRW=X'];
            log(`Testing symbols: ${symbols.join(', ')}`);

            for (const symbol of symbols) {
                try {
                    const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1m&range=1d&_=${Date.now()}`;
                    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}&_=${Date.now()}`;

                    log(`Fetching ${symbol} via proxy...`);
                    const res = await fetch(proxyUrl);

                    if (!res.ok) {
                        log(`FAILED Fetch for ${symbol}: Status ${res.status}`, 'error');
                        continue;
                    }

                    const rawData = await res.json();
                    const data = JSON.parse(rawData.contents);

                    if (!data.chart || !data.chart.result) {
                        log(`INVALID DATA for ${symbol}: Check console for raw JSON`, 'error');
                        console.log(data);
                        continue;
                    }

                    const meta = data.chart.result[0].meta;
                    log(`SUCCESS for ${symbol}: Price=${meta.regularMarketPrice}, PrevClose=${meta.previousClose}`, 'success');
                } catch (e) {
                    log(`ERROR fetching ${symbol}: ${e.message}`, 'error');
                    console.error(e);
                }
            }
        }

        testFetch();
    </script>
</body>

</html>
